name: Refresh catalog

on:
  schedule:
    # Daily at 04:00 UTC (~09:30 IST) — quiet hours
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      max_lookups:
        description: 'Max YouTube lookups this run (cap workflow time)'
        required: false
        default: '300'

permissions:
  contents: write

concurrency:
  group: refresh-catalog
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade yt-dlp requests

      - name: Refresh catalog
        env:
          MAX_LOOKUPS: ${{ inputs.max_lookups || '300' }}
        run: python scripts/refresh_catalog.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          # Pull most recent main in case anything raced this workflow
          git pull --rebase origin main || true
          git add catalog.json
          git commit -m "chore: refresh catalog $(date -u +%Y-%m-%d) [skip ci]"
          git push
