<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#141218" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#fffbff" media="(prefers-color-scheme: light)" />
<title>Yadrcha · Random Telugu Music</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://aac.saavncdn.com" />
<link rel="preconnect" href="https://c.saavncdn.com" />
<link rel="preconnect" href="https://lrclib.net" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" />

<style>
  /* ============================================================
     YADRCHA — Material 3 inspired Telugu music player
     - Light + dark themes via [data-theme] attribute
     - Material Symbols icons
     - Card-based layout with elevated surfaces
     - Dedicated lyrics card (rectangular, scrollable, large type)
     ============================================================ */

  :root {
    /* Color tokens — DARK theme defaults */
    --md-surface:        #14111c;
    --md-surface-1:      #1c1825;
    --md-surface-2:      #221d2c;
    --md-surface-3:      #2a2434;
    --md-surface-4:      #322b3c;
    --md-on-surface:     #ece6f0;
    --md-on-surface-var: #b6afc3;
    --md-on-surface-dim: #847c93;
    --md-outline:        #4a4453;
    --md-outline-var:    #2e2937;

    --md-primary:        #d0bcff;
    --md-on-primary:     #381e72;
    --md-primary-c:      #4f378b;
    --md-on-primary-c:   #eaddff;

    --md-secondary:      #ccc2dc;
    --md-on-secondary:   #332d41;
    --md-secondary-c:    #4a4458;
    --md-on-secondary-c: #e8def8;

    --md-tertiary:       #efb8c8;
    --md-on-tertiary:    #492532;
    --md-tertiary-c:     #633b48;
    --md-on-tertiary-c:  #ffd8e4;

    --md-error:          #f2b8b5;
    --md-on-error:       #601410;

    --shadow-1: 0 1px 2px rgba(0,0,0,0.30), 0 1px 3px 1px rgba(0,0,0,0.15);
    --shadow-2: 0 1px 2px rgba(0,0,0,0.30), 0 2px 6px 2px rgba(0,0,0,0.15);
    --shadow-3: 0 1px 3px rgba(0,0,0,0.30), 0 4px 8px 3px rgba(0,0,0,0.15);

    --t-fast: 150ms cubic-bezier(0.2, 0, 0, 1);
    --t-med:  280ms cubic-bezier(0.2, 0, 0, 1);
    --t-slow: 450ms cubic-bezier(0.2, 0, 0, 1);

    --r-xs: 4px;  --r-sm: 8px;  --r-md: 12px;
    --r-lg: 16px; --r-xl: 24px; --r-full: 999px;

    color-scheme: dark;
  }

  [data-theme="light"] {
    --md-surface:        #fffbff;
    --md-surface-1:      #f7f1fa;
    --md-surface-2:      #f1ebf4;
    --md-surface-3:      #ebe4ee;
    --md-surface-4:      #e6dde9;
    --md-on-surface:     #1d1a22;
    --md-on-surface-var: #49454f;
    --md-on-surface-dim: #79747e;
    --md-outline:        #79747e;
    --md-outline-var:    #cac4d0;

    --md-primary:        #6750a4;
    --md-on-primary:     #ffffff;
    --md-primary-c:      #eaddff;
    --md-on-primary-c:   #21005d;

    --md-secondary:      #625b71;
    --md-on-secondary:   #ffffff;
    --md-secondary-c:    #e8def8;
    --md-on-secondary-c: #1d192b;

    --md-tertiary:       #7d5260;
    --md-on-tertiary:    #ffffff;
    --md-tertiary-c:     #ffd8e4;
    --md-on-tertiary-c:  #31111d;

    --md-error:          #b3261e;
    --md-on-error:       #ffffff;

    --shadow-1: 0 1px 2px rgba(0,0,0,0.10), 0 1px 3px 1px rgba(0,0,0,0.05);
    --shadow-2: 0 1px 2px rgba(0,0,0,0.10), 0 2px 6px 2px rgba(0,0,0,0.06);
    --shadow-3: 0 1px 3px rgba(0,0,0,0.10), 0 4px 8px 3px rgba(0,0,0,0.06);

    color-scheme: light;
  }

  /* ============== RESET + BASE ============== */
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    overflow: hidden;
    overscroll-behavior: none;
  }
  body {
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--md-on-surface);
    background: var(--md-surface);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    height: 100dvh;
    width: 100vw;
    position: fixed;
    inset: 0;
    transition: background var(--t-med), color var(--t-med);
  }
  button { font: inherit; color: inherit; cursor: pointer; }
  ::selection { background: var(--md-primary-c); color: var(--md-on-primary-c); }

  .material-symbols-outlined {
    font-family: 'Material Symbols Outlined';
    font-weight: normal;
    font-style: normal;
    font-size: 24px;
    line-height: 1;
    letter-spacing: normal;
    text-transform: none;
    display: inline-block;
    white-space: nowrap;
    word-wrap: normal;
    direction: ltr;
    -webkit-font-feature-settings: 'liga';
    -webkit-font-smoothing: antialiased;
  }

  /* ============== AMBIENT BG ============== */
  .ambient {
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(50% 40% at 25% 20%, color-mix(in srgb, var(--md-primary-c) 18%, transparent), transparent 70%),
      radial-gradient(50% 40% at 75% 30%, color-mix(in srgb, var(--md-tertiary-c) 14%, transparent), transparent 70%),
      radial-gradient(60% 50% at 50% 110%, color-mix(in srgb, var(--md-secondary-c) 12%, transparent), transparent 70%),
      var(--md-surface);
    transition: background var(--t-med);
  }

  /* ============== APP LAYOUT ============== */
  .app {
    height: 100dvh;
    width: 100vw;
    display: grid;
    place-items: center;
    overflow: hidden;
    padding: 0;
  }
  .surface {
    width: 100%;
    max-width: 460px;
    height: min(100dvh, 880px);
    background: var(--md-surface-1);
    border-radius: 28px;
    border: 1px solid var(--md-outline-var);
    box-shadow: var(--shadow-3);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    transition: background var(--t-med), border-color var(--t-med);
  }
  @media (max-width: 640px) {
    .app { padding: 0; }
    .surface {
      max-width: none;
      height: 100dvh;
      border-radius: 0;
      border: none;
      box-shadow: none;
    }
  }

  .scroll-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 16px 100px;   /* bottom space for FAB */
    scrollbar-width: thin;
    scrollbar-color: var(--md-outline) transparent;
    scroll-behavior: smooth;
  }
  .scroll-area::-webkit-scrollbar { width: 6px; }
  .scroll-area::-webkit-scrollbar-track { background: transparent; }
  .scroll-area::-webkit-scrollbar-thumb { background: var(--md-outline); border-radius: 3px; }

  /* ============== TOP APP BAR ============== */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 4px;
    flex-shrink: 0;
    min-height: 56px;
    padding-top: max(14px, env(safe-area-inset-top, 14px));
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    min-width: 0;
  }
  .brand-logo {
    width: 32px; height: 32px;
    display: grid; place-items: center;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--md-primary), var(--md-tertiary));
    color: var(--md-on-primary);
  }
  .brand-logo .material-symbols-outlined {
    font-size: 20px;
    font-variation-settings: 'FILL' 1;
  }
  .brand-name {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--md-on-surface);
  }

  .top-actions {
    display: flex; align-items: center; gap: 4px;
  }

  /* ============== ICON BUTTON (Material) ============== */
  .icon-btn {
    appearance: none; border: none; background: transparent;
    width: 40px; height: 40px;
    border-radius: var(--r-full);
    display: grid; place-items: center;
    color: var(--md-on-surface-var);
    cursor: pointer;
    position: relative;
    transition: background var(--t-fast), color var(--t-fast);
  }
  .icon-btn:hover { background: color-mix(in srgb, var(--md-on-surface) 8%, transparent); }
  .icon-btn:active { background: color-mix(in srgb, var(--md-on-surface) 12%, transparent); }
  .icon-btn:focus-visible { outline: 2px solid var(--md-primary); outline-offset: 2px; }
  .icon-btn .material-symbols-outlined { font-size: 22px; }
  .icon-btn.toggle.on {
    background: var(--md-primary-c);
    color: var(--md-on-primary-c);
  }
  .icon-btn.toggle.on:hover {
    background: color-mix(in srgb, var(--md-primary-c) 88%, var(--md-on-primary));
  }

  /* ============== MOOD PILL ============== */
  .mood {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    border-radius: var(--r-full);
    background: var(--md-surface-2);
    border: 1px solid var(--md-outline-var);
    color: var(--md-on-surface-var);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin: 8px auto 4px;
    width: fit-content;
  }
  .mood .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--md-primary);
    box-shadow: 0 0 8px var(--md-primary);
  }
  @media (prefers-reduced-motion: no-preference) {
    .mood .dot { animation: pulse 2s infinite; }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.55; }
  }
  .mood-row { text-align: center; }

  /* ============== ALBUM ART CARD ============== */
  .art-card {
    background: var(--md-surface-2);
    border-radius: var(--r-xl);
    padding: 24px 20px 20px;
    margin: 16px 0;
    text-align: center;
    transition: background var(--t-med);
    user-select: none;
    touch-action: pan-y;
  }
  .art-frame {
    width: 180px;
    height: 180px;
    margin: 0 auto 18px;
    border-radius: var(--r-lg);
    overflow: hidden;
    background: var(--md-surface-3);
    box-shadow: var(--shadow-2);
    position: relative;
    transition: transform var(--t-med);
  }
  .art-frame.spin-burst {
    animation: artSpinBurst 0.7s cubic-bezier(.5,.05,.5,.95) 1;
  }
  @keyframes artSpinBurst {
    0%   { transform: scale(1) rotate(0); }
    50%  { transform: scale(0.92) rotate(8deg); }
    100% { transform: scale(1) rotate(0); }
  }
  .art-img {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    background-color: var(--md-surface-3);
    transition: opacity var(--t-slow);
  }
  /* subtle pulse ring while playing */
  .art-frame::after {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    border: 2px solid transparent;
    pointer-events: none;
    transition: border-color var(--t-med);
  }
  .playing .art-frame::after {
    border-color: color-mix(in srgb, var(--md-primary) 40%, transparent);
  }
  @media (prefers-reduced-motion: no-preference) {
    .playing .art-frame::after {
      animation: artGlow 2.4s ease-in-out infinite;
    }
  }
  @keyframes artGlow {
    0%, 100% { box-shadow: 0 0 0 0 transparent; }
    50%      { box-shadow: 0 0 0 6px color-mix(in srgb, var(--md-primary) 18%, transparent); }
  }

  .meta-block {
    min-width: 0;
    transition: opacity var(--t-med);
  }
  .meta-movie {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--md-tertiary);
    margin-bottom: 6px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .meta-title {
    font-family: "DM Serif Display";
    font-style: italic;
    font-size: 24px;
    line-height: 1.2;
    margin: 0 0 6px;
    color: var(--md-on-surface);
    word-break: break-word;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .meta-artist {
    font-size: 13px;
    color: var(--md-on-surface-var);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .meta-block.revealing .meta-movie,
  .meta-block.revealing .meta-title,
  .meta-block.revealing .meta-artist {
    filter: blur(8px);
    opacity: 0.2;
  }

  /* ============== PROGRESS SLIDER ============== */
  .progress-row {
    margin: 16px 4px 12px;
  }
  .progress {
    position: relative;
    height: 4px;
    background: var(--md-surface-3);
    border-radius: var(--r-full);
    cursor: pointer;
    transition: height var(--t-fast);
  }
  .progress:hover { height: 6px; }
  .progress .filled {
    position: absolute; inset: 0 auto 0 0;
    width: 0%;
    background: var(--md-primary);
    border-radius: var(--r-full);
    pointer-events: none;
  }
  .progress .thumb {
    position: absolute;
    top: 50%; left: 0;
    width: 14px; height: 14px;
    background: var(--md-primary);
    border-radius: 50%;
    transform: translate(-50%, -50%) scale(0);
    transition: transform var(--t-fast);
    pointer-events: none;
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--md-primary) 18%, transparent);
  }
  .progress:hover .thumb,
  .progress:focus-within .thumb { transform: translate(-50%, -50%) scale(1); }
  .progress:focus-visible { outline: 2px solid var(--md-primary); outline-offset: 6px; }
  .times {
    display: flex; justify-content: space-between;
    font-variant-numeric: tabular-nums;
    font-size: 11px;
    color: var(--md-on-surface-var);
    margin-top: 6px;
    letter-spacing: 0.3px;
  }

  /* ============== CONTROLS ============== */
  .controls {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 4px;
    align-items: center;
    margin-bottom: 16px;
    min-width: 0;
  }
  .ctrl {
    appearance: none; border: none; background: transparent;
    width: 100%;
    height: 48px;
    border-radius: var(--r-md);
    display: grid; place-items: center;
    color: var(--md-on-surface-var);
    transition: background var(--t-fast), color var(--t-fast), transform var(--t-fast);
  }
  .ctrl .material-symbols-outlined { font-size: 24px; }
  .ctrl:hover { background: color-mix(in srgb, var(--md-on-surface) 8%, transparent); color: var(--md-on-surface); }
  .ctrl:active { transform: scale(0.92); }
  .ctrl:focus-visible { outline: 2px solid var(--md-primary); outline-offset: 2px; }
  .ctrl.liked {
    color: var(--md-tertiary);
  }
  .ctrl.liked .material-symbols-outlined { font-variation-settings: 'FILL' 1; }
  .ctrl.play {
    height: 56px;
    background: var(--md-primary);
    color: var(--md-on-primary);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-1);
  }
  .ctrl.play .material-symbols-outlined {
    font-size: 30px;
    font-variation-settings: 'FILL' 1;
  }
  .ctrl.play:hover { background: color-mix(in srgb, var(--md-primary) 90%, var(--md-on-primary)); transform: scale(1.02); }
  .ctrl.play:active { transform: scale(0.96); }

  .heart-burst {
    position: absolute;
    pointer-events: none;
    color: var(--md-tertiary);
    font-size: 14px;
    animation: heartFly 1s ease-out forwards;
    z-index: 50;
  }
  @keyframes heartFly {
    0%   { transform: translate(0, 0) scale(.4); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translate(var(--dx, 20px), -80px) scale(1.2); opacity: 0; }
  }

  /* ============== LYRICS CARD ============== */
  .lyrics-card {
    background: var(--md-surface-2);
    border-radius: var(--r-xl);
    padding: 20px 16px;
    margin-bottom: 16px;
    height: 220px;
    overflow: hidden;
    position: relative;
    transition: background var(--t-med);
  }
  .lyrics-card::before, .lyrics-card::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 36px;
    pointer-events: none;
    z-index: 2;
  }
  .lyrics-card::before {
    top: 0;
    background: linear-gradient(180deg, var(--md-surface-2) 0%, transparent 100%);
  }
  .lyrics-card::after {
    bottom: 0;
    background: linear-gradient(0deg, var(--md-surface-2) 0%, transparent 100%);
  }
  .lyrics-track {
    display: flex;
    flex-direction: column;
    align-items: center;
    will-change: transform;
    transition: transform 420ms cubic-bezier(.4,0,.2,1);
    padding: 90px 0;   /* center the active line */
  }
  .lyrics-line {
    font-family: "DM Serif Display";
    font-style: italic;
    font-size: 14px;
    line-height: 1.45;
    margin: 6px 0;
    text-align: center;
    color: var(--md-on-surface-dim);
    transition: color var(--t-med), font-size var(--t-med), transform var(--t-med), opacity var(--t-med);
    max-width: 100%;
    word-wrap: break-word;
    padding: 0 8px;
    opacity: 0.6;
  }
  .lyrics-line.active {
    color: var(--md-on-surface);
    font-size: 22px;
    font-weight: 600;
    opacity: 1;
    text-shadow: 0 0 24px color-mix(in srgb, var(--md-primary) 40%, transparent);
    transform: scale(1.02);
  }
  .lyrics-line.near {
    color: var(--md-on-surface-var);
    font-size: 16px;
    opacity: 0.85;
  }
  .lyrics-state {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 0 24px;
  }
  .lyrics-state.hidden { display: none; }
  .lyrics-state .icon {
    font-size: 32px;
    color: var(--md-on-surface-dim);
    margin-bottom: 6px;
  }
  .lyrics-state .icon.material-symbols-outlined {
    font-variation-settings: 'FILL' 0;
  }
  .lyrics-state .label {
    font-size: 12px;
    color: var(--md-on-surface-var);
    letter-spacing: 0.4px;
    margin-bottom: 2px;
  }
  .lyrics-state .sub {
    font-family: "DM Serif Display";
    font-style: italic;
    font-size: 18px;
    color: var(--md-on-surface);
  }

  /* ============== ERA CHIPS ============== */
  .dial-row { margin-bottom: 12px; }
  .dial-label {
    display: block;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--md-on-surface-dim);
    text-align: center;
    margin-bottom: 8px;
  }
  .dial {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    min-width: 0;
  }
  .chip {
    appearance: none;
    border: 1px solid var(--md-outline-var);
    background: transparent;
    color: var(--md-on-surface-var);
    border-radius: var(--r-sm);
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.2px;
    cursor: pointer;
    transition: background var(--t-fast), color var(--t-fast), border-color var(--t-fast), transform var(--t-fast);
    min-height: 32px;
    white-space: nowrap;
    flex-grow: 0;
  }
  .chip:hover { background: color-mix(in srgb, var(--md-on-surface) 5%, transparent); color: var(--md-on-surface); }
  .chip:active { transform: scale(0.96); }
  .chip[aria-pressed="true"] {
    background: var(--md-secondary-c);
    color: var(--md-on-secondary-c);
    border-color: transparent;
    font-weight: 600;
  }

  /* ============== SHUFFLE FAB (extended) ============== */
  .fab {
    position: absolute;
    right: 16px;
    bottom: 16px;
    bottom: max(16px, env(safe-area-inset-bottom, 16px));
    appearance: none; border: none;
    background: var(--md-primary);
    color: var(--md-on-primary);
    height: 56px;
    padding: 0 24px;
    border-radius: var(--r-lg);
    font-family: "Inter";
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    display: inline-flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow-3);
    cursor: pointer;
    transition: background var(--t-fast), box-shadow var(--t-fast), transform var(--t-fast);
    z-index: 20;
  }
  .fab:hover {
    background: color-mix(in srgb, var(--md-primary) 88%, var(--md-on-primary));
    box-shadow: 0 6px 12px rgba(0,0,0,0.20);
  }
  .fab:active { transform: scale(0.97); }
  .fab:disabled {
    background: var(--md-surface-3);
    color: var(--md-on-surface-dim);
    cursor: wait;
    box-shadow: none;
  }
  .fab .material-symbols-outlined { font-size: 22px; }
  .spin-burst { animation: spinBurst 0.7s cubic-bezier(.5,.05,.5,.95) 1; }
  @keyframes spinBurst {
    0%   { transform: rotate(0); }
    100% { transform: rotate(360deg); }
  }

  /* ============== TOAST ============== */
  .toast {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translate(-50%, 130%);
    background: var(--md-surface-4);
    color: var(--md-on-surface);
    border: 1px solid var(--md-outline-var);
    border-radius: var(--r-md);
    padding: 10px 16px;
    font-size: 12px;
    font-weight: 500;
    z-index: 30;
    max-width: calc(100% - 32px);
    text-align: center;
    box-shadow: var(--shadow-2);
    transition: transform var(--t-med), opacity var(--t-med);
    opacity: 0;
    pointer-events: none;
  }
  .toast.show {
    transform: translate(-50%, 0);
    opacity: 1;
  }

  /* ============== BOOTING ============== */
  .booting {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    z-index: 100;
    background: color-mix(in srgb, var(--md-surface) 90%, transparent);
    backdrop-filter: blur(20px);
  }
  .booting.hidden { display: none; }
  .boot-card {
    text-align: center;
    padding: 32px;
    max-width: 320px;
  }
  .boot-spinner {
    width: 36px; height: 36px;
    margin: 0 auto 16px;
    border: 3px solid var(--md-surface-3);
    border-top-color: var(--md-primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .boot-card h3 {
    font-family: "DM Serif Display";
    font-style: italic;
    font-size: 22px;
    margin: 0 0 8px;
    color: var(--md-on-surface);
  }
  .boot-card p {
    font-size: 12px;
    color: var(--md-on-surface-var);
    margin: 0;
  }

  /* hidden audio */
  audio { display: none; }

  /* swipe state */
  .art-card.swiping .art-frame { transition: transform 200ms ease-out; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>

          <button class="chip" data-era="90s" aria-pressed="false" type="button">90s</button>

    <!-- SHUFFLE FAB -->

      <span id="shuffle-label">Loading…</span>
    </button>

    <!-- TOAST -->
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <!-- BOOTING -->
    <div class="booting" id="booting">

        <div class="boot-spinner" aria-hidden="true"></div>

      </div>
    </div>

  </div><!-- /surface -->
</div><!-- /app -->

<audio id="audio" preload="auto" crossorigin="anonymous"></audio>

<script>
/* ============================================================
   YADRCHA — Material 3 Telugu music player
   - JioSaavn CDN audio (full songs)
   - LRClib synced lyrics (skip-no-lyrics toggle)
   - Heuristic + Groq AI recommender
   - Persistent history + likes + theme
   ============================================================ */
(function () {
  'use strict';
  const $ = (id) => document.getElementById(id);

  // "Latest" = past 3 years (current and 2 prior)
  const NOW_YEAR = new Date().getFullYear();
  const LATEST_FROM_YEAR = NOW_YEAR - 2;

  const CACHE_KEY = 'yadrcha.catalog.v4';
  const CACHE_TTL = 24 * 60 * 60 * 1000;
  const HISTORY_KEY = 'yadrcha.history.v1';
  const HISTORY_MAX = 80;
  const THEME_KEY = 'yadrcha.theme';
  const SKIP_NO_LYRICS_KEY = 'yadrcha.skipNoLyrics';

  // AI recommender
  const AI_WORKER_URL = 'https://yadrcha-ai.bcharan197.workers.dev';
  const AI_LIKES_THRESHOLD = 5;
  const AI_TIMEOUT_MS = 800;
  const AI_CANDIDATE_COUNT = 20;

  /* ---------- THEME ---------- */
  function detectInitialTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === 'light' || saved === 'dark') return saved;
    return window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }
  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem(THEME_KEY, theme); } catch (_) {}
    // Button icon shows the action (i.e. icon of the OTHER mode)
    $('btn-theme-icon').textContent = theme === 'dark' ? 'light_mode' : 'dark_mode';
  }

  /* ---------- STATE ---------- */
  const state = {
    catalog: [],
    current: null,
    history: JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'),
    era: 'all',
    isPlaying: false,
    isMystery: false,
    likes: new Set(JSON.parse(localStorage.getItem('yadrcha.likes') || '[]')),
    theme: detectInitialTheme(),
  };

  const lyricsState = {
    lines: null,
    activeIdx: -1,
    forSongId: null,
    abort: null,
    skipMode: JSON.parse(localStorage.getItem(SKIP_NO_LYRICS_KEY) ?? 'true'),
    consecutiveSkips: 0,
    MAX_CONSECUTIVE_SKIPS: 8,
  };

  function pushHistory(id) {
    state.history.push(id);
    if (state.history.length > HISTORY_MAX) state.history = state.history.slice(-HISTORY_MAX);
    try { localStorage.setItem(HISTORY_KEY, JSON.stringify(state.history)); }
    catch (_) {}
  }

  /* ---------- UTILS ---------- */
  const fmt = (t) => {
    if (!isFinite(t) || t < 0) t = 0;
    return Math.floor(t / 60) + ':' + Math.floor(t % 60).toString().padStart(2, '0');
  };
  function pickEra(year) {
    if (!year) return 'all';
    if (year < 1990) return 'vintage';
    if (year < 2000) return '90s';
    if (year >= LATEST_FROM_YEAR) return 'latest';
    return '2000s';
  }
  function showToast(msg, ms = 2200) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => t.classList.remove('show'), ms);
  }

  /* ---------- MOOD ---------- */
  function moodForNow() {
    const h = new Date().getHours();
    if (h >= 5 && h < 11)  return 'Morning ragas · live mix';
    if (h >= 11 && h < 16) return 'Afternoon hits · live mix';
    if (h >= 16 && h < 20) return 'Sunset melodies · live mix';
    if (h >= 20 && h < 24) return 'Evening romance · live mix';
    return 'Late-night chill · live mix';
  }

  /* ---------- CATALOG ---------- */
  async function loadCatalog() {
    try {
      const url = new URL('catalog.json', location.href).href + '?t=' + Date.now();
      const r = await fetch(url, { cache: 'no-cache' });
      if (r.ok) {
        const data = await r.json();
        if (data && Array.isArray(data.songs) && data.songs.length > 30) {
          saveCache(data.songs);
          return expandCatalog(data.songs);
        }
      }
    } catch (_) {}
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) {
        const obj = JSON.parse(raw);
        if (obj && Date.now() - obj.ts < CACHE_TTL && Array.isArray(obj.data) && obj.data.length > 30) {
          return expandCatalog(obj.data);
        }
      }
    } catch (_) {}
    return [];
  }
  function expandCatalog(slim) {
    return slim.map((s) => ({
      id: s.i, title: s.t, artist: s.a, movie: s.m,
      url: s.u, cover: s.c, year: s.y, duration: s.d,
      era: pickEra(s.y),
    }));
  }
  function saveCache(slim) {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: slim })); }
    catch (e) {
      try {
        localStorage.removeItem(CACHE_KEY);
        localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: slim.slice(0, 800) }));
      } catch (_) {}
    }
  }

  /* ---------- POOL / RANDOM ---------- */
  function pool() {
    if (state.era === 'all') return state.catalog;
    return state.catalog.filter((s) => s.era === state.era);
  }
  function pickRandom() {
    const p = pool();
    if (!p.length) return null;
    const recent = new Set(state.history.slice(-Math.min(p.length - 1, 30)));
    const fresh = p.filter((s) => !recent.has(s.id) && (!state.current || s.id !== state.current.id));
    const choices = fresh.length ? fresh : p;
    return choices[Math.floor(Math.random() * choices.length)];
  }

  /* ---------- AI / HEURISTIC RECOMMENDER ---------- */
  function buildTaste() {
    const liked = state.catalog.filter((s) => state.likes.has(s.id));
    if (!liked.length) return null;
    const tally = (key) => {
      const m = new Map();
      liked.forEach((s) => {
        const v = (s[key] || '').split(/\s*[,&]\s*/).filter(Boolean);
        v.forEach((x) => m.set(x, (m.get(x) || 0) + 1));
      });
      return [...m.entries()].sort((a, b) => b[1] - a[1]).map(([k]) => k);
    };
    const artists = tally('artist').slice(0, 3);
    const movies = tally('movie').slice(0, 3);
    const eraCount = liked.reduce((a, s) => { a[s.era] = (a[s.era] || 0) + 1; return a; }, {});
    const eras = Object.entries(eraCount).sort((a, b) => b[1] - a[1]).map(([k]) => k).slice(0, 2);
    const years = liked.map((s) => s.year).filter(Boolean);
    const yearCentroid = years.length ? Math.round(years.reduce((a, b) => a + b, 0) / years.length) : NOW_YEAR;
    return {
      artists, movies, eras, yearCentroid, likedCount: liked.length,
      artistSet: new Set(artists), movieSet: new Set(movies),
      topEra: eras[0] || 'all',
    };
  }

  function sampleCandidates(n) {
    const p = pool();
    if (!p.length) return [];
    const recent = new Set(state.history.slice(-30));
    const curId = state.current?.id;
    const fresh = p.filter((s) => !recent.has(s.id) && s.id !== curId);
    const src = fresh.length >= n ? fresh : (fresh.length ? fresh : p);
    const out = [];
    const used = new Set();
    while (out.length < Math.min(n, src.length)) {
      const i = Math.floor(Math.random() * src.length);
      if (used.has(i)) continue;
      used.add(i);
      out.push(src[i]);
    }
    return out;
  }

  function heuristicPick(candidates) {
    const taste = buildTaste();
    if (!taste) return candidates[Math.floor(Math.random() * candidates.length)];
    const recent = new Set(state.history.slice(-15));
    let best = null, bestScore = -Infinity;
    for (const c of candidates) {
      const cArtists = (c.artist || '').split(/\s*[,&]\s*/);
      const artistMatch = cArtists.filter((a) => taste.artistSet.has(a)).length;
      const movieMatch = taste.movieSet.has(c.movie) ? 1 : 0;
      const eraMatch = c.era === taste.topEra ? 1 : 0;
      const yearProx = c.year ? Math.max(0, 1 - Math.abs(c.year - taste.yearCentroid) / 15) : 0;
      const histPenalty = recent.has(c.id) ? 1 : 0;
      const score = 3.0 * artistMatch + 2.0 * movieMatch + 1.5 * eraMatch
                  + 1.0 * yearProx - 4.0 * histPenalty + 0.3 * Math.random();
      if (score > bestScore) { bestScore = score; best = c; }
    }
    return best || candidates[0];
  }

  async function aiPick(candidates) {
    if (!AI_WORKER_URL) return null;
    const taste = buildTaste();
    if (!taste || taste.likedCount < AI_LIKES_THRESHOLD) return null;
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), AI_TIMEOUT_MS);
    try {
      const r = await fetch(AI_WORKER_URL, {
        method: 'POST', signal: ctrl.signal,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          currentSong: state.current ? {
            id: state.current.id, title: state.current.title, movie: state.current.movie,
            artist: state.current.artist, year: state.current.year,
          } : null,
          taste: {
            artists: taste.artists, movies: taste.movies, eras: taste.eras,
            yearCentroid: taste.yearCentroid, likedCount: taste.likedCount,
          },
          history: state.history.slice(-5),
          candidates: candidates.map((c) => ({
            id: c.id, title: c.title, movie: c.movie, artist: c.artist, year: c.year,
          })),
        }),
      });
      clearTimeout(timer);
      if (!r.ok) return null;
      const data = await r.json();
      return candidates.find((c) => c.id === data.id) || null;
    } catch (_) { clearTimeout(timer); return null; }
  }

  let nextPickCache = null;
  async function prefetchNext() {
    const cands = sampleCandidates(AI_CANDIDATE_COUNT);
    if (!cands.length) { nextPickCache = null; return; }
    const taste = buildTaste();
    if (!taste || taste.likedCount < AI_LIKES_THRESHOLD) {
      nextPickCache = cands[Math.floor(Math.random() * cands.length)];
      return;
    }
    const ai = await aiPick(cands);
    nextPickCache = ai || heuristicPick(cands);
  }
  function pickNext() {
    if (nextPickCache) {
      const p = nextPickCache; nextPickCache = null; return p;
    }
    const cands = sampleCandidates(AI_CANDIDATE_COUNT);
    if (!cands.length) return null;
    const taste = buildTaste();
    if (!taste || taste.likedCount < AI_LIKES_THRESHOLD) {
      return cands[Math.floor(Math.random() * cands.length)];
    }
    return heuristicPick(cands);
  }

  /* ---------- LYRICS (LRClib) ---------- */
  function parseLRC(text) {
    if (!text) return null;
    const out = [];
    text.split('\n').forEach((line) => {
      const stamps = [...line.matchAll(/\[(\d+):(\d+(?:\.\d+)?)\]/g)];
      const lyric = line.replace(/\[[^\]]*\]/g, '').trim();
      if (!stamps.length || !lyric) return;
      stamps.forEach((m) => {
        const t = parseInt(m[1], 10) * 60 + parseFloat(m[2]);
        if (isFinite(t)) out.push({ time: t, text: lyric });
      });
    });
    out.sort((a, b) => a.time - b.time);
    return out.length ? out : null;
  }

  async function fetchLyrics(song) {
    if (!song) return null;
    if (lyricsState.abort) lyricsState.abort.abort();
    lyricsState.abort = new AbortController();
    const sig = lyricsState.abort.signal;
    const enc = encodeURIComponent;
    const tryUrls = [
      `https://lrclib.net/api/get?artist_name=${enc(song.artist || '')}&track_name=${enc(song.title || '')}&album_name=${enc(song.movie || '')}&duration=${song.duration || ''}`,
      `https://lrclib.net/api/get?artist_name=${enc(song.artist || '')}&track_name=${enc(song.title || '')}&album_name=${enc(song.movie || '')}`,
      `https://lrclib.net/api/get?artist_name=${enc(song.artist || '')}&track_name=${enc(song.title || '')}`,
    ];
    for (const url of tryUrls) {
      try {
        const r = await fetch(url, { signal: sig });
        if (!r.ok) continue;
        const data = await r.json();
        if (data && data.syncedLyrics) {
          const parsed = parseLRC(data.syncedLyrics);
          if (parsed) return parsed;
        }
      } catch (e) { if (e.name === 'AbortError') return null; }
    }
    try {
      const q = (song.title || '') + ' ' + (song.movie || '');
      const r = await fetch(`https://lrclib.net/api/search?q=${enc(q.trim())}`, { signal: sig });
      if (r.ok) {
        const arr = await r.json();
        const match = Array.isArray(arr) && arr.find((x) => x && x.syncedLyrics);
        if (match) {
          const parsed = parseLRC(match.syncedLyrics);
          if (parsed) return parsed;
        }
      }
    } catch (e) { if (e.name === 'AbortError') return null; }
    return null;
  }

  function showLyricsState(text, kind) {
    $('lyrics-state').classList.remove('hidden');
    $('lyrics-state-text').textContent = text;
    $('lyrics-track').innerHTML = '';
    const stateEl = $('lyrics-state');
    const iconEl = stateEl.querySelector('.icon');
    if (iconEl) {
      iconEl.textContent = kind === 'searching' ? 'search' :
                            kind === 'instrumental' ? 'music_note' : 'lyrics';
    }
  }
  function hideLyricsState() {
    $('lyrics-state').classList.add('hidden');
  }
  function clearLyrics() {
    lyricsState.lines = null;
    lyricsState.activeIdx = -1;
    lyricsState.forSongId = null;
    $('lyrics-track').innerHTML = '';
    $('lyrics-track').style.transform = '';
  }
  function renderLyricsLines() {
    hideLyricsState();
    const track = $('lyrics-track');
    track.innerHTML = '';
    lyricsState.lines.forEach((line, i) => {
      const el = document.createElement('div');
      el.className = 'lyrics-line';
      el.dataset.idx = i;
      el.textContent = line.text;
      track.appendChild(el);
    });
    lyricsState.activeIdx = -1;
    updateActiveLyric();
  }
  function updateActiveLyric() {
    if (!lyricsState.lines || !lyricsState.lines.length) return;
    const t = audio.currentTime || 0;
    let idx = -1;
    for (let i = 0; i < lyricsState.lines.length; i++) {
      if (lyricsState.lines[i].time <= t + 0.05) idx = i;
      else break;
    }
    if (idx === lyricsState.activeIdx) return;
    lyricsState.activeIdx = idx;
    const track = $('lyrics-track');
    const lines = track.children;
    let activeEl = null;
    for (let i = 0; i < lines.length; i++) {
      const el = lines[i];
      el.classList.remove('active', 'near');
      if (i === idx) { el.classList.add('active'); activeEl = el; }
      else if (Math.abs(i - idx) === 1) el.classList.add('near');
    }
    if (activeEl) {
      const card = $('lyrics-card');
      const cardH = card.clientHeight;
      const lineCenter = activeEl.offsetTop + activeEl.offsetHeight / 2;
      const offset = (cardH / 2) - lineCenter;
      track.style.transform = `translateY(${offset}px)`;
    }
  }

  function setSkipMode(on) {
    lyricsState.skipMode = !!on;
    localStorage.setItem(SKIP_NO_LYRICS_KEY, JSON.stringify(!!on));
    $('btn-lyrics-mode').classList.toggle('on', !!on);
    $('btn-lyrics-mode').setAttribute('aria-pressed', !!on ? 'true' : 'false');
  }

  async function loadLyricsForCurrentSong() {
    const song = state.current;
    if (!song) return;
    showLyricsState('Looking for lyrics…', 'searching');
    const lines = await fetchLyrics(song);
    if (!state.current || state.current.id !== song.id) return;
    if (lines) {
      lyricsState.consecutiveSkips = 0;
      lyricsState.lines = lines;
      lyricsState.forSongId = song.id;
      renderLyricsLines();
    } else {
      if (lyricsState.skipMode) {
        lyricsState.consecutiveSkips++;
        if (lyricsState.consecutiveSkips >= lyricsState.MAX_CONSECUTIVE_SKIPS) {
          showToast('Skip mode disabled — too many songs lack lyrics', 4000);
          setSkipMode(false);
          lyricsState.consecutiveSkips = 0;
          showLyricsState('Instrumental ♫', 'instrumental');
        } else {
          showToast(`No lyrics · skipping (${lyricsState.consecutiveSkips}/${lyricsState.MAX_CONSECUTIVE_SKIPS})`, 1400);
          setTimeout(() => nextRandom(), 350);
        }
      } else {
        showLyricsState('No synced lyrics for this song', 'instrumental');
      }
    }
  }

  /* ---------- AUDIO ENGINE ---------- */
  const audio = $('audio');
  audio.addEventListener('play',  () => { state.isPlaying = true;  renderPlayState(); });
  audio.addEventListener('pause', () => { state.isPlaying = false; renderPlayState(); });
  audio.addEventListener('ended', () => nextRandom());
  audio.addEventListener('timeupdate', () => {
    const cur = audio.currentTime;
    const tot = audio.duration || (state.current?.duration || 0);
    const pct = tot > 0 ? (cur / tot) * 100 : 0;
    $('filled').style.width = pct + '%';
    $('thumb').style.left = pct + '%';
    $('time-cur').textContent = fmt(cur);
    $('time-tot').textContent = fmt(tot);
    $('progress').setAttribute('aria-valuenow', Math.round(pct));
    if (lyricsState.lines && lyricsState.forSongId === state.current?.id) updateActiveLyric();
  });
  audio.addEventListener('error', () => {
    showToast('Couldn’t play that one · skipping');
    setTimeout(nextRandom, 200);
  });

  /* ---------- PLAYBACK ---------- */
  function play(song, opts = {}) {
    if (!song) return;
    if (state.current) pushHistory(state.current.id);
    state.current = song;
    const frame = $('art-frame');
    frame.classList.remove('spin-burst');
    void frame.offsetWidth;
    frame.classList.add('spin-burst');
    state.isMystery = !!opts.mystery;
    audio.src = song.url;
    audio.play().catch(() => {});
    renderNowPlaying();
    updateMediaSession(song);
    clearLyrics();
    setTimeout(() => loadLyricsForCurrentSong(), 50);
    setTimeout(() => prefetchNext(), 200);
  }
  function togglePlay() {
    if (!state.current) { nextRandom(); return; }
    if (audio.paused) audio.play().catch(() => {});
    else audio.pause();
  }
  function nextRandom(opts) {
    const next = pickNext();
    if (next) play(next, opts);
  }
  function prev() {
    if (state.history.length) {
      const id = state.history.pop();
      const s = state.catalog.find((x) => x.id === id);
      if (s) { state.current = null; play(s); }
    } else {
      audio.currentTime = 0;
    }
  }

  /* ---------- RENDER ---------- */
  function renderPlayState() {
    $('btn-play-icon').textContent = state.isPlaying ? 'pause' : 'play_arrow';
    $('btn-play').setAttribute('aria-label', state.isPlaying ? 'Pause' : 'Play');
    $('surface').classList.toggle('playing', state.isPlaying);
    if ('mediaSession' in navigator) {
      navigator.mediaSession.playbackState = state.isPlaying ? 'playing' : 'paused';
    }
  }
  function renderNowPlaying() {
    const s = state.current;
    if (!s) return;
    const meta = $('meta');
    if (state.isMystery) {
      state.isMystery = false;
      meta.classList.add('revealing');
      setTimeout(() => meta.classList.remove('revealing'), 2400);
    }
    $('meta-movie').textContent = s.movie || '— Telugu film —';
    $('meta-title').textContent = s.title;
    $('meta-artist').textContent = s.artist + (s.year ? ` · ${s.year}` : '');
    $('art-img').style.backgroundImage = `url("${s.cover}")`;
    $('btn-like').classList.toggle('liked', state.likes.has(s.id));
    $('btn-like').setAttribute('aria-pressed', state.likes.has(s.id) ? 'true' : 'false');
    syncDialHighlight();
  }
  function refreshChips() {
    $('shuffle-mega').disabled = !pool().length;
    $('shuffle-label').textContent = pool().length ? 'Shuffle' : 'No songs';
  }
  function syncDialHighlight() {
    let active = state.era;
    if (state.era === 'all' && state.current && state.current.era && state.current.era !== 'all') {
      active = state.current.era;
    }
    document.querySelectorAll('.chip').forEach((btn) => {
      btn.setAttribute('aria-pressed', btn.dataset.era === active ? 'true' : 'false');
    });
  }

  /* ---------- MEDIA SESSION ---------- */
  function wireMediaSession() {
    if (!('mediaSession' in navigator)) return;
    navigator.mediaSession.setActionHandler('play',  () => togglePlay());
    navigator.mediaSession.setActionHandler('pause', () => togglePlay());
    navigator.mediaSession.setActionHandler('previoustrack', () => prev());
    navigator.mediaSession.setActionHandler('nexttrack', () => nextRandom());
  }
  function updateMediaSession(s) {
    if (!('mediaSession' in navigator) || !s) return;
    try {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: s.title, artist: s.artist, album: s.movie || 'Telugu',
        artwork: [{ src: s.cover, sizes: '500x500', type: 'image/jpeg' }],
      });
    } catch (_) {}
  }

  /* ---------- HEART BURST ---------- */
  function heartBurst(button) {
    const surface = $('surface');
    const rect = button.getBoundingClientRect();
    const sRect = surface.getBoundingClientRect();
    for (let i = 0; i < 5; i++) {
      const h = document.createElement('div');
      h.className = 'heart-burst material-symbols-outlined';
      h.textContent = 'favorite';
      h.style.left = (rect.left - sRect.left + rect.width / 2) + 'px';
      h.style.top  = (rect.top - sRect.top) + 'px';
      h.style.setProperty('--dx', (Math.random() * 60 - 30) + 'px');
      h.style.fontSize = (16 + Math.random() * 14) + 'px';
      h.style.animationDelay = (i * 60) + 'ms';
      surface.appendChild(h);
      setTimeout(() => h.remove(), 1200);
    }
  }

  /* ---------- SWIPE on art card ---------- */
  function wireSwipe() {
    const card = $('art-card');
    const frame = $('art-frame');
    let startX = 0, startY = 0, dx = 0, dy = 0, swiping = false;
    function onStart(e) {
      const t = e.touches ? e.touches[0] : e;
      startX = t.clientX; startY = t.clientY; dx = 0; dy = 0; swiping = true;
      card.classList.add('swiping');
    }
    function onMove(e) {
      if (!swiping) return;
      const t = e.touches ? e.touches[0] : e;
      dx = t.clientX - startX;
      dy = t.clientY - startY;
      if (Math.abs(dy) > Math.abs(dx) * 1.4) { onCancel(); return; }
      frame.style.transform = `translateX(${dx * 0.4}px)`;
      frame.style.opacity = String(Math.max(0.6, 1 - Math.abs(dx) / 320));
    }
    function onEnd() {
      if (!swiping) return;
      swiping = false;
      card.classList.remove('swiping');
      frame.style.transform = '';
      frame.style.opacity = '';
      if (Math.abs(dx) > 60) {
        if (dx < 0) nextRandom();
        else prev();
      }
    }
    function onCancel() {
      swiping = false;
      card.classList.remove('swiping');
      frame.style.transform = '';
      frame.style.opacity = '';
    }
    card.addEventListener('touchstart', onStart, { passive: true });
    card.addEventListener('touchmove', onMove, { passive: true });
    card.addEventListener('touchend', onEnd);
    card.addEventListener('touchcancel', onCancel);
    let mouseDown = false;
    card.addEventListener('mousedown', (e) => { mouseDown = true; onStart(e); });
    card.addEventListener('mousemove', (e) => { if (mouseDown) onMove(e); });
    card.addEventListener('mouseup', () => { if (mouseDown) { mouseDown = false; onEnd(); } });
    card.addEventListener('mouseleave', () => { if (mouseDown) { mouseDown = false; onCancel(); } });
  }

  /* ---------- WIRE UI ---------- */
  document.querySelectorAll('.chip').forEach((btn) => {
    btn.addEventListener('click', () => {
      const newEra = btn.dataset.era;
      if (newEra === state.era) return;
      state.era = newEra;
      document.querySelectorAll('.chip').forEach((b) => b.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');
      nextPickCache = null;
      refreshChips();
      if (state.catalog.length) nextRandom();
    });
  });

  $('shuffle-mega').addEventListener('click', () => {
    if ($('shuffle-mega').disabled) return;
    const icon = $('shuffle-icon');
    icon.classList.remove('spin-burst');
    void icon.offsetWidth;
    icon.classList.add('spin-burst');
    nextRandom();
  });
  $('btn-play').addEventListener('click', togglePlay);
  $('btn-next').addEventListener('click', () => nextRandom());
  $('btn-prev').addEventListener('click', prev);
  $('btn-mystery').addEventListener('click', () => nextRandom({ mystery: true }));
  $('btn-like').addEventListener('click', (e) => {
    const s = state.current;
    if (!s) return;
    if (state.likes.has(s.id)) state.likes.delete(s.id);
    else { state.likes.add(s.id); heartBurst(e.currentTarget); }
    localStorage.setItem('yadrcha.likes', JSON.stringify([...state.likes]));
    $('btn-like').classList.toggle('liked', state.likes.has(s.id));
    $('btn-like').setAttribute('aria-pressed', state.likes.has(s.id) ? 'true' : 'false');
    nextPickCache = null;
    setTimeout(() => prefetchNext(), 100);
  });
  $('btn-keys').addEventListener('click', () => {
    showToast('Space play · ←/→ skip · S shuffle · L like · M mystery', 4000);
  });
  $('btn-lyrics-mode').addEventListener('click', () => {
    setSkipMode(!lyricsState.skipMode);
    showToast(lyricsState.skipMode ? 'Skip mode ON · songs without lyrics auto-skip' : 'Skip mode OFF · all songs play', 3000);
  });
  $('btn-theme').addEventListener('click', () => {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    applyTheme(state.theme);
    showToast(state.theme === 'dark' ? 'Dark mode' : 'Light mode', 1500);
  });
  setSkipMode(lyricsState.skipMode);

  $('progress').addEventListener('click', (ev) => {
    const rect = ev.currentTarget.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (ev.clientX - rect.left) / rect.width));
    if (audio.duration) audio.currentTime = pct * audio.duration;
  });
  $('progress').addEventListener('keydown', (e) => {
    const dir = e.key === 'ArrowRight' ? 1 : e.key === 'ArrowLeft' ? -1 : 0;
    if (!dir || !audio.duration) return;
    audio.currentTime = Math.max(0, Math.min(audio.duration, audio.currentTime + dir * 5));
    e.preventDefault();
  });

  window.addEventListener('keydown', (e) => {
    if (['INPUT', 'TEXTAREA'].includes(document.activeElement?.tagName)) return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    else if (e.key === 'ArrowRight') nextRandom();
    else if (e.key === 'ArrowLeft') prev();
    else if (e.key.toLowerCase() === 's') $('shuffle-mega').click();
    else if (e.key.toLowerCase() === 'l') $('btn-like').click();
    else if (e.key.toLowerCase() === 'm') $('btn-mystery').click();
    else if (e.key.toLowerCase() === 't') $('btn-theme').click();
  });

  /* ---------- BOOT ---------- */
  applyTheme(state.theme);
  $('mood-text').textContent = moodForNow();
  wireMediaSession();
  wireSwipe();

  loadCatalog().then((cat) => {
    state.catalog = cat;
    refreshChips();
    $('booting').classList.add('hidden');
    if (!cat.length) {
      showToast('Couldn’t load catalogue · check connection', 5000);
    }
  }).catch(() => {
    $('booting').classList.add('hidden');
    showToast('Catalogue load failed · check connection', 5000);
  });

})();
</script>
</body>
</html>
